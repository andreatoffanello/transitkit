appId: com.transitkit.appalcart
---
# Verifica: PlannerQuickBlock in HomeScreen apre il picker destinazione
# (UX corrente: From/To inline sul box + bottone Search esplicito — il tap
# sul box apre la ricerca fermata "To", non più il PlannerScreen)

- launchApp:
    clearState: false

# HomeScreen già visibile (startDestination) — attendi il box a cache fredda
- extendedWaitUntil:
    visible:
      id: "planner_home_box"
    timeout: 15000

# Tap sul PlannerQuickBlock glass card
- tapOn:
    id: "planner_home_box"
- waitForAnimationToEnd

# Picker destinazione aperto — opzioni fisse del picker visibili
- extendedWaitUntil:
    visible: "Pick on map"
    timeout: 10000
- assertVisible: "Current location"
