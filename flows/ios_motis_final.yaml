appId: com.transitkit.appalcart
---
# Test finale MOTIS: setta entrambi field e verifica che il planner
# carichi journey reali (o errore esplicito, ma NON -1011).

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 6000

# Tap su origin row (prima riga del planner card: "My location" se GPS on, "Departure" altrimenti)
- tapOn:
    id: "home_planner_block"
    index: 0
- waitForAnimationToEnd

# In LocationPickerView tap "Choose on map" per origin
- tapOn: "Choose on map"
- waitForAnimationToEnd:
    timeout: 2000

# Conferma il punto come origin
- tapOn:
    id: "map_picker_confirm"
- waitForAnimationToEnd:
    timeout: 3000

# Destination picker si apre automaticamente ("Where to?")
# Tap "Choose on map" per destination
- tapOn: "Choose on map"
- waitForAnimationToEnd:
    timeout: 2000

# Sposta leggermente la mappa per punto diverso da origin
- swipe:
    start: "50%, 50%"
    end: "40%, 40%"
    duration: 500

- waitForAnimationToEnd:
    timeout: 1500

# Conferma il punto centrale della mappa
- tapOn:
    id: "map_picker_confirm"
- waitForAnimationToEnd:
    timeout: 5000

# Ora dovrebbe essere in PlannerScreen con journey (o errore esplicito)
- takeScreenshot: flows/screenshots/motis_final
