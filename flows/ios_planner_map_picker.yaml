appId: com.transitkit.appalcart
---
# Naviga fino al LocationPickerMap e fa screenshot per verifica visiva.
# Sequenza: Home → tap destination field → tap "Scegli sulla mappa"

- launchApp:
    clearState: false

- waitForAnimationToEnd

# Tap sulla riga destinazione nella PlannerHomeBox (seconda riga del card planner)
- tapOn:
    point: "50%, 26%"

- waitForAnimationToEnd

# Ora siamo in LocationPickerView — tap "Scegli sulla mappa"
- tapOn: "Scegli sulla mappa"

- waitForAnimationToEnd:
    timeout: 3000

# Screenshot per verifica pin al centro
- takeScreenshot: flows/screenshots/map_picker_pin_check

# Tap "Conferma posizione" — verifica che il dismiss a cascata torni al planner
- tapOn: "Conferma posizione"

- waitForAnimationToEnd:
    timeout: 4000

- takeScreenshot: flows/screenshots/map_picker_after_confirm
