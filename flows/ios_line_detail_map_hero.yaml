appId: com.transitkit.appalcart
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 6000
- openLink: "transitkit://line/3"
- extendedWaitUntil:
    visible:
      text: "B"
    timeout: 5000
- assertVisible:
    id: "btn_line_map"
# Toolbar item (placement: .topBarTrailing) — Maestro does not expose the second
# ToolbarItem's resource-id when two items share the same placement.
# Assert via accessibilityLabel ("Line map") which IS visible in the a11y tree.
- extendedWaitUntil:
    visible:
      text: "Line map"
    timeout: 4000
- assertVisible: "Stops served"
