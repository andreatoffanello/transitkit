name: TransitKit
options:
  bundleIdPrefix: com.transitkit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete

# --------------------------------------------------------------------------
# Swift Package dependencies
# --------------------------------------------------------------------------
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"

targets:
  TransitKit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TransitKit/Sources
        excludes:
          - "**/*.example.swift"
    resources:
      - path: TransitKit/Sources/Resources
    settings:
      base:
        # OPERATOR_ID is overridable from the xcodebuild CLI for white-label
        # builds (e.g. `xcodebuild ... OPERATOR_ID=acme`). When building from
        # the Xcode IDE there is no CLI to pass it on, so we default to
        # `appalcart` here. Without this default the IDE resolves the bundle
        # id to `com.transitkit.` (empty placeholder) which mismatches the
        # bundle id baked into GoogleService-Info.plist → Firebase refuses
        # to configure and FCM never issues a token.
        OPERATOR_ID: appalcart
        PRODUCT_BUNDLE_IDENTIFIER: com.transitkit.${OPERATOR_ID}
        DEVELOPMENT_TEAM: "R56VCP5L45"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: TransitKit/Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TransitKit/Sources/App/TransitKit.entitlements
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
          ENABLE_TESTABILITY: NO
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          # APNs production environment for App Store / TestFlight builds.
          # Resolved into TransitKit.entitlements via $(APS_ENVIRONMENT).
          APS_ENVIRONMENT: production
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_COMPILATION_MODE: singlefile
          ENABLE_TESTABILITY: YES
          # APNs sandbox for Xcode-signed dev builds. Production builds
          # override this in the Release config above.
          APS_ENVIRONMENT: development
    info:
      path: TransitKit/Sources/App/Info.plist
      properties:
        # White-label: il display name nello springboard e nei prompt di
        # sistema è il brand dell'APP (AppalRider), NON dell'operatore
        # (AppalCART) di cui mostriamo i dati. La localizzazione del brand
        # name e della usage description in 3 lingue vive in
        # InfoPlist.xcstrings (en/it/es-419). I valori qui sono i fallback
        # English usati se la xcstrings non risolve.
        CFBundleDisplayName: "AppalRider"
        CFBundleShortVersionString: "1.2.3"
        CFBundleVersion: "13"
        # Apple HIG: la usage description deve spiegare il beneficio per
        # l'utente in modo specifico, distinguere chiaramente chi accede
        # alla posizione (AppalRider, l'app) da chi fornisce i dati
        # (AppalCART, l'operatore), e dare reassurance sulla privacy.
        NSLocationWhenInUseUsageDescription: "AppalRider uses your location to show AppalCART stops near you and the most relevant upcoming departures. Your location stays on your device — it's never sent to any server."
        UILaunchScreen:
          UIColorName: SystemBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
        # Export compliance: app uses only standard HTTPS (URLSession) +
        # platform-provided crypto. No proprietary or non-exempt encryption.
        # Declaring this here lets Apple skip the question on every submission.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - transitkit
            CFBundleURLName: "com.transitkit.${OPERATOR_ID}"
    dependencies:
      - sdk: MapKit.framework
      - sdk: UserNotifications.framework
      - package: Firebase
        product: FirebaseMessaging
    scheme:
      testTargets:
        - TransitKitTests

  TransitKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TransitKit/Tests
    dependencies:
      - target: TransitKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
