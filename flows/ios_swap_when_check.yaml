appId: com.transitkit.appalcart
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 6000

# Assicurarsi di essere sulla home tab
- tapOn:
    id: "tab_home"
- waitForAnimationToEnd:
    timeout: 2000

# Setto destination per avere swap button visibile
- tapOn: "Destination"
- waitForAnimationToEnd

- tapOn:
    point: "50%, 55%"
- waitForAnimationToEnd:
    timeout: 5000

# Sono in PlannerScreen, torno indietro per vedere swap icon nella home
- tapOn:
    point: "10%, 8%"
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: flows/screenshots/swap_icon

# Tap chip "Now" per aprire WhenView
- tapOn:
    id: "home_planner_when_mode"
- waitForAnimationToEnd:
    timeout: 2500

- takeScreenshot: flows/screenshots/when_view_default

# Tap "Arriva entro"
- tapOn: "Arrive by"
- waitForAnimationToEnd:
    timeout: 1500

- takeScreenshot: flows/screenshots/when_view_arrive
