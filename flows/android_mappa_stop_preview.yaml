appId: com.transitkit.appalcart
---
# Verifica: deeplink mappa con preview card fermata — mappa si posiziona sulla fermata

- launchApp:
    clearState: false
- openLink: "transitkit://map/stop/appalcart_asu_college_st_station"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "stop_preview_card"
    timeout: 20000   # cache fredda: lo schedule si scarica al primo avvio

# Preview card deve apparire
- assertVisible:
    id: "stop_preview_card"
- assertVisible: "ASU College St Station"
