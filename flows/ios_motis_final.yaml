appId: com.transitkit.appalcart
---
# Test finale MOTIS: setta entrambi field e verifica che il planner
# carichi journey reali (o errore esplicito, ma NON -1011).

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Tap su origin row via accessibility id
- tapOn:
    id: "home_planner_row_origin"
- waitForAnimationToEnd

# In LocationPickerView tap "La mia posizione"
- tapOn:
    id: "picker_my_location"
- waitForAnimationToEnd:
    timeout: 3000

# Ora origin = userLocation, tap destination
- tapOn:
    id: "home_planner_row_destination"
- waitForAnimationToEnd

# Tap "Scegli sulla mappa"
- tapOn:
    id: "picker_map_pick"
- waitForAnimationToEnd:
    timeout: 2000

# Conferma il punto centrale della mappa
- tapOn:
    id: "map_picker_confirm"
- waitForAnimationToEnd:
    timeout: 5000

# Ora dovrebbe essere in PlannerScreen con journey (o errore esplicito)
- takeScreenshot: flows/screenshots/motis_final
