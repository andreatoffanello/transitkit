appId: com.transitkit.appalcart
---
# Verifica: deeplink a StopDetail apre la schermata fermata corretta

- launchApp:
    clearState: false
- openLink: "transitkit://stop/appalcart_asu_appalachian_heights"
- waitForAnimationToEnd
# cache fredda: il nome risolto appare solo a schedule scaricato
- extendedWaitUntil:
    visible: "ASU Appalachian Heights"
    timeout: 20000
