appId: com.transitkit.appalcart
---
# Verifica: tab Mappa — pill controlli unificato (2D/3D + recentra).
# Il pill è sempre espanso sulla MapTab (niente btn_map_expand: la mappa è
# già fullscreen); reset bearing appare solo a mappa ruotata, non assertato.

- launchApp:
    clearState: false

# Deeplink diretto alla mappa
- openLink: "transitkit://map"
- waitForAnimationToEnd

# Verifica i bottoni del pill (wait: a cache fredda la mappa arriva tardi)
- extendedWaitUntil:
    visible:
      id: "btn_map_toggle_3d"
    timeout: 20000
- assertVisible:
    id: "btn_map_recenter"

# Tap recentra
- tapOn:
    id: "btn_map_recenter"
- waitForAnimationToEnd

# Toggle 3D
- tapOn:
    id: "btn_map_toggle_3d"
- waitForAnimationToEnd
- assertVisible:
    id: "btn_map_toggle_3d"
