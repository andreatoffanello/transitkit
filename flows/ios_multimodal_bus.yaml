appId: com.transitkit.appalcart
---
# Verifica detail di un journey CON BUS: tap sul secondo journey
# (primo è walking-only, secondo invece ha WALK+BUS+WALK)

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 6000

# Setup come ios_multimodal: arriva alla lista journey
- tapOn: "Destination"
- waitForAnimationToEnd

- tapOn: "Choose on map"
- waitForAnimationToEnd:
    timeout: 3000

- swipe:
    start: "70%, 30%"
    end: "30%, 70%"
    duration: 800

- waitForAnimationToEnd:
    timeout: 2500

- tapOn: "Confirm location"
- waitForAnimationToEnd:
    timeout: 5000

# Tap sul SECONDO journey (quello con bus, ~50%, 51% in iOS 26 dopo header)
- tapOn:
    point: "50%, 51%"
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: flows/screenshots/mm_bus_detail
