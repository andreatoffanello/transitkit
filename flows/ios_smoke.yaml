appId: com.transitkit.appalcart
---
# Smoke: app si avvia e la tab bar mostra le 5 tab correnti.
# (Servizi non è più in tab bar — card in Home; "Lines" è "Routes".)

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 6000
- assertVisible: "Home"
- assertVisible: "Schedules"
- assertVisible: "Routes"
- assertVisible: "Map"
- assertVisible: "Alerts"
